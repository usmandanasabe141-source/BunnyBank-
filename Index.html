<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>BunnyBand Pro</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f7f6;
}

header{
background:#007bff;
color:white;
padding:15px;
text-align:center;
}

nav{
display:flex;
background:#222;
}

nav button{
flex:1;
padding:12px;
border:none;
background:none;
color:white;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.card{

background:white;

padding:20px;

margin:15px 0;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,.08);

}

.section{
display:none;
}

.active{
display:block;
}

.balance{

font-size:35px;

color:#007bff;

font-weight:bold;

}

input,
select,
button{

width:100%;

padding:12px;

margin-top:10px;

border-radius:8px;

border:1px solid #ddd;

}

button{

background:#007bff;

color:white;

font-weight:bold;

}

.small{

color:green;

}

</style>

</head>

<body>

<header>

<h2>BunnyBand Pro Dashboard</h2>

<p>Welcome, Usman Isa</p>

</header>

<nav>

<button onclick="show('dashboard')">

Dashboard

</button>

<button onclick="show('deposit')">

Deposit

</button>

<button onclick="show('tasks')">

Tasks

</button>

<button onclick="show('team')">

Team

</button>

<button onclick="show('withdraw')">

Withdraw

</button>

</nav>


<div class="container">

<!-- DASHBOARD -->

<div
id="dashboard"
class="section active card">

<h3>Total Balance</h3>

<div
class="balance"
id="balance">

₦0

</div>

<p class="small">

System Active

</p>

</div>


<!-- DEPOSIT -->

<div
id="deposit"
class="section card">

<h3>Deposit</h3>

<p>

Send payment to:

</p>

<input
value="9118918906"
readonly>

<input
value="Opay"
readonly>

<input
value="Usman Isa Dan Asabe"
readonly>

<input
id="dAmt"
type="number"
placeholder="Amount paid">

<button
onclick="deposit()">

I Have Paid

</button>

<p id="dMsg"></p>

</div>



<!-- TASK -->

<div
id="tasks"
class="section card">

<h3>Daily Task</h3>

<p>

Complete task = ₦500

</p>

<button
onclick="task()">

Complete Task

</button>

<p id="tMsg"></p>

</div>



<!-- TEAM -->

<div
id="team"
class="section card">

<h3>Your Team</h3>

<p>

No referrals yet

</p>

<input
placeholder="Referral Link">

<button>

Copy

</button>

</div>



<!-- WITHDRAW -->

<div
id="withdraw"
class="section card">

<h3>Withdraw</h3>

<input
id="wAmt"
type="number"
placeholder="Amount">

<input
id="accNo"
placeholder="Account Number">

<select
id="bank"
onchange="loadName()">

<option>

Select Bank

</option>

<option>Opay</option>

<option>Palmpay</option>

<option>GTBank</option>

<option>UBA</option>

<option>Access</option>

<option>Zenith</option>

</select>

<input
id="accName"
readonly
placeholder="Account Name">

<button
onclick="withdraw()">

Withdraw

</button>

<p id="wMsg"></p>

</div>

</div>



<script>

let balance=0;


function show(id){

document
.querySelectorAll(".section")

.forEach(

x=>x.classList.remove("active")

);

document

.getElementById(id)

.classList.add("active");

}


function update(){

document

.getElementById("balance")

.innerText=

"₦"+

balance.toLocaleString();

}



function deposit(){

let amt=

parseFloat(

document

.getElementById("dAmt")

.value

);

if(!amt){

alert("Enter amount");

return;

}

balance+=amt;

update();

document

.getElementById("dMsg")

.innerText=

"Deposit Confirmed";

}



function task(){

balance+=500;

update();

document

.getElementById("tMsg")

.innerText=

"+₦500 Added";

}



function loadName(){

let no=

document

.getElementById("accNo")

.value;

if(no.length>=10){

document

.getElementById("accName")

.value=

"Verified Account";

}

}



function withdraw(){

let amt=

parseFloat(

document

.getElementById("wAmt")

.value

);

let name=

document

.getElementById("accName")

.value;


if(amt>balance){

document

.getElementById("wMsg")

.innerText=

"Insufficient Balance";

return;

}


balance-=amt;

update();

document

.getElementById("wMsg")

.innerText=

"Sent to "+name;

}



update();

</script>

</body>

</html>
